<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priyamana Thozhi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --yellow: #FFD600;
    --yellow-dark: #F5C000;
    --yellow-light: #FFF9C4;
    --blue: #1565C0;
    --blue-mid: #1976D2;
    --blue-light: #E3F2FD;
    --blue-pale: #BBDEFB;
    --white: #FFFFFF;
    --gray: #607D8B;
    --shadow: 0 4px 20px rgba(21,101,192,0.15);
    --shadow-card: 0 8px 32px rgba(21,101,192,0.18);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1565C0 0%, #0D47A1 40%, #1A237E 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .app-wrapper {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .app-header {
    text-align: center;
    padding: 10px 0 0;
  }

  .app-title {
    font-size: 28px;
    font-weight: 900;
    color: #FFD600;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .app-subtitle {
    font-size: 13px;
    color: #BBDEFB;
    font-weight: 600;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .player-card {
    background: #FFFFFF;
    border-radius: 28px;
    padding: 24px 24px 20px;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }

  .player-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: #FFF9C4;
    border-radius: 50%;
    opacity: 0.5;
  }

  .player-card::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -30px;
    width: 90px; height: 90px;
    background: #E3F2FD;
    border-radius: 50%;
    opacity: 0.6;
  }

  .album-art-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .goggle-frame {
    position: relative;
    width: 150px;
    height: 90px;
  }

  .goggle-outer {
    position: absolute;
    width: 150px;
    height: 90px;
    background: #1565C0;
    border-radius: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(21,101,192,0.35), inset 0 2px 4px rgba(255,255,255,0.2);
  }

  .goggle-bridge {
    position: absolute;
    width: 16px; height: 10px;
    background: #0D47A1;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    border-radius: 3px;
  }

  .goggle-lens {
    width: 58px; height: 58px;
    background: #FFD600;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.2);
    overflow: hidden;
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .goggle-lens:first-child { margin-right: 8px; }
  .goggle-lens:last-child  { margin-left: 8px; }

  .goggle-lens-inner {
    width: 40px; height: 40px;
    background: #FFF9C4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .goggle-lenses {
    display: flex;
    gap: 0;
    position: relative;
    z-index: 2;
  }

  .spinning { animation: spin 3s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .song-info {
    text-align: center;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }

  .song-name {
    font-size: 20px;
    font-weight: 800;
    color: #0D47A1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-vibe {
    font-size: 12px;
    color: #90A4AE;
    font-weight: 600;
    margin-top: 3px;
  }

  .progress-wrapper {
    position: relative;
    z-index: 1;
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 8px;
    background: #E3F2FD;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: visible;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FFD600, #FFA000);
    border-radius: 10px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -6px; top: -4px;
    width: 16px; height: 16px;
    background: #FFD600;
    border-radius: 50%;
    border: 3px solid #1565C0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #90A4AE;
    font-weight: 700;
    margin-top: 10px;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
    padding: 0;
  }

  .ctrl-btn:hover { transform: scale(1.15); }
  .ctrl-btn:active { transform: scale(0.92); }

  .btn-prev, .btn-next {
    width: 44px; height: 44px;
    background: #E3F2FD;
  }

  .btn-prev:hover, .btn-next:hover { background: #BBDEFB; }

  .btn-play {
    width: 64px; height: 64px;
    background: #FFD600;
    box-shadow: 0 4px 16px rgba(255,214,0,0.5);
  }

  .btn-play:hover {
    background: #FFC000;
    box-shadow: 0 6px 20px rgba(255,214,0,0.6);
  }

  .btn-play svg, .btn-prev svg, .btn-next svg {
    pointer-events: none;
  }

  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .vol-icon {
    flex-shrink: 0;
  }

  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: #E3F2FD;
    border-radius: 10px;
    outline: none;
    cursor: pointer;
  }

  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px; height: 18px;
    background: #1565C0;
    border-radius: 50%;
    border: 3px solid #FFD600;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: transform 0.15s;
  }

  .vol-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .vol-slider::-moz-range-thumb {
    width: 18px; height: 18px;
    background: #1565C0;
    border-radius: 50%;
    border: 3px solid #FFD600;
    cursor: pointer;
  }

  .playlist-card {
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }

  .playlist-title {
    font-size: 13px;
    font-weight: 800;
    color: #FFD600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .playlist-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #FFD600 rgba(255,255,255,0.1);
  }

  .playlist-list::-webkit-scrollbar { width: 4px; }
  .playlist-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .playlist-list::-webkit-scrollbar-thumb { background: #FFD600; border-radius: 4px; }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    border: 1.5px solid transparent;
  }

  .playlist-item:hover {
    background: rgba(255,255,255,0.15);
    transform: translateX(4px);
    border-color: rgba(255,214,0,0.3);
  }

  .playlist-item.active {
    background: #FFD600;
    border-color: #FFD600;
    transform: translateX(6px);
    box-shadow: 0 4px 14px rgba(255,214,0,0.4);
  }

  .playlist-num {
    font-size: 11px;
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .playlist-item.active .playlist-num { color: #0D47A1; }

  .playlist-song-name {
    font-size: 14px;
    font-weight: 700;
    color: #FFFFFF;
    flex: 1;
  }

  .playlist-item.active .playlist-song-name { color: #0D47A1; }

  .playing-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
    flex-shrink: 0;
  }

  .bar {
    width: 3px;
    background: #0D47A1;
    border-radius: 2px;
    animation: bounce-bar 0.6s ease-in-out infinite alternate;
  }

  .bar:nth-child(2) { animation-delay: 0.15s; }
  .bar:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce-bar {
    from { height: 4px; }
    to { height: 14px; }
  }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .app-title { font-size: 23px; }
    .player-card { padding: 18px 16px 16px; }
    .btn-play { width: 56px; height: 56px; }
    .btn-prev, .btn-next { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<div class="app-wrapper">
  <div class="app-header">
    <div class="app-title">Priyamana Thozhi</div>
  </div>

  <div class="player-card">
    <div class="album-art-wrapper">
      <div class="goggle-frame">
        <div class="goggle-outer">
          <div class="goggle-lenses">
            <div class="goggle-lens" id="leftLens">
              <div class="goggle-lens-inner">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="14" cy="14" r="13" fill="#FFD600" stroke="#1565C0" stroke-width="2"/>
                  <path d="M9 14 Q14 8 19 14 Q14 20 9 14Z" fill="#1565C0"/>
                  <circle cx="14" cy="14" r="3" fill="#1565C0"/>
                  <circle cx="12" cy="12" r="1.5" fill="#FFF9C4"/>
                </svg>
              </div>
            </div>
            <div class="goggle-bridge"></div>
            <div class="goggle-lens" id="rightLens">
              <div class="goggle-lens-inner">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="14" cy="14" r="13" fill="#FFD600" stroke="#1565C0" stroke-width="2"/>
                  <path d="M9 14 Q14 8 19 14 Q14 20 9 14Z" fill="#1565C0"/>
                  <circle cx="14" cy="14" r="3" fill="#1565C0"/>
                  <circle cx="12" cy="12" r="1.5" fill="#FFF9C4"/>
                </svg>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="song-info">
      <div class="song-name" id="songName">Nanbiye</div>
      <div class="song-vibe">Thozhi Vibes</div>
    </div>

    <div class="progress-wrapper">
      <div class="progress-bar-bg" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn btn-prev" id="prevBtn" title="Previous">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="4" y="4" width="3" height="14" rx="1.5" fill="#1565C0"/>
          <path d="M18 4L8 11L18 18V4Z" fill="#1565C0"/>
        </svg>
      </button>

      <button class="ctrl-btn btn-play" id="playBtn" title="Play/Pause">
        <svg id="playIcon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M10 7L22 14L10 21V7Z" fill="#1565C0"/>
        </svg>
        <svg id="pauseIcon" width="28" height="28" viewBox="0 0 28 28" fill="none" class="hidden">
          <rect x="7" y="6" width="5" height="16" rx="2" fill="#1565C0"/>
          <rect x="16" y="6" width="5" height="16" rx="2" fill="#1565C0"/>
        </svg>
      </button>

      <button class="ctrl-btn btn-next" id="nextBtn" title="Next">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="15" y="4" width="3" height="14" rx="1.5" fill="#1565C0"/>
          <path d="M4 4L14 11L4 18V4Z" fill="#1565C0"/>
        </svg>
      </button>
    </div>

    <div class="volume-row">
      <svg class="vol-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 6.5H6L9.5 3.5V14.5L6 11.5H3V6.5Z" fill="#1565C0"/>
        <path d="M12 5.5C13.4 6.5 14 7.7 14 9C14 10.3 13.4 11.5 12 12.5" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80">
    </div>
  </div>

  <div class="playlist-card">
    <div class="playlist-title">Playlist</div>
    <div class="playlist-list" id="playlistEl"></div>
  </div>
</div>

<audio id="audioEl" preload="auto"></audio>

<script>
const songs = [
  { name: "Nanbiye", src: "songs/Nanbiye-MassTamilan.io.mp3" },
  { name: "Thozhi", src: "songs/Thozhi-MassTamilan.fm.mp3" },
  { name: "Minalai pidithu", src: "songs/Minnalai Pidithu.mp3" },
  { name: "Unakkenna Venum Sollu", src: "songs/Unakkenna-Venum-Sollu.mp3" },
  { name: "Natpukillai Ellai", src: "songs/Natpukkillai-Ellai-MassTamilan.com.mp3" },
  { name: "Life of Pazham", src: "songs/Life-of-Pazham-MassTamilan.dev.mp3" },
  { name: "Kizhakke Paarthen", src: "songs/Kizhakke-Paarthen.mp3" },
  { name: "June July Maadham", src: "songs/June-July-Maathadhil.mp3" },
  { name: "Kannil Anbai Solvale", src: "songs/Kannil-Anbai-Solvale.mp3" },
  { name: "En Friend Ah Pola Yaaru Machan", src: "songs/En-Frienda-Pola-MassTamilan.fm.mp3" },
  { name: "Konjum Mainakalae", src: "songs/Konjum-Mainakkale.mp3" }
];

const audio = document.getElementById('audioEl');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const volSlider = document.getElementById('volSlider');
const songNameEl = document.getElementById('songName');
const playlistEl = document.getElementById('playlistEl');
const leftLens = document.getElementById('leftLens');
const rightLens = document.getElementById('rightLens');

let currentIndex = 0;
let isPlaying = false;

function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function buildPlaylist() {
  playlistEl.innerHTML = '';
  songs.forEach((song, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
    item.innerHTML = `
      <span class="playlist-num">${i + 1}</span>
      <span class="playlist-song-name">${song.name}</span>
      <div class="playing-bars${i === currentIndex && isPlaying ? '' : ' hidden'}">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>`;
    item.addEventListener('click', () => loadSong(i, true));
    playlistEl.appendChild(item);
  });
}

function updatePlaylistUI() {
  const items = playlistEl.querySelectorAll('.playlist-item');
  items.forEach((item, i) => {
    item.classList.toggle('active', i === currentIndex);
    const bars = item.querySelector('.playing-bars');
    if (i === currentIndex && isPlaying) bars.classList.remove('hidden');
    else bars.classList.add('hidden');
  });
}

function loadSong(index, autoPlay) {
  currentIndex = index;
  const song = songs[currentIndex];
  audio.src = song.src;
  audio.load();
  songNameEl.textContent = song.name;
  progressFill.style.width = '0%';
  currentTimeEl.textContent = '0:00';
  totalTimeEl.textContent = '0:00';

  if (autoPlay) {
    audio.play().then(() => {
      isPlaying = true;
      updatePlayUI();
    }).catch(e => console.warn('Autoplay blocked:', e));
  } else {
    isPlaying = false;
    updatePlayUI();
  }
  updatePlaylistUI();
}

function updatePlayUI() {
  playIcon.classList.toggle('hidden', isPlaying);
  pauseIcon.classList.toggle('hidden', !isPlaying);
  if (isPlaying) {
    leftLens.classList.add('spinning');
    rightLens.classList.add('spinning');
  } else {
    leftLens.classList.remove('spinning');
    rightLens.classList.remove('spinning');
  }
  updatePlaylistUI();
}

playBtn.addEventListener('click', () => {
  if (audio.paused) {
    audio.play().then(() => {
      isPlaying = true;
      updatePlayUI();
    }).catch(e => {
      console.error("Play failed:", e);
    });
  } else {
    audio.pause();
    isPlaying = false;
    updatePlayUI();
  }
});

prevBtn.addEventListener('click', () => {
  currentIndex = (currentIndex - 1 + songs.length) % songs.length;
  loadSong(currentIndex, isPlaying);
});

nextBtn.addEventListener('click', () => {
  currentIndex = (currentIndex + 1) % songs.length;
  loadSong(currentIndex, isPlaying);
});

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
  }
});

audio.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', () => {
  currentIndex = (currentIndex + 1) % songs.length;
  loadSong(currentIndex, true);
});

progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
});

progressBar.addEventListener('touchstart', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const ratio = (e.touches[0].clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
}, { passive: true });

volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
});

audio.volume = volSlider.value / 100;

buildPlaylist();
loadSong(0, false);
document.body.addEventListener('click', () => {
  audio.play().then(() => {
    audio.pause();
  }).catch(() => {});
}, { once: true });
</script>
</body>
</html>
